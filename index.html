<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Infrastructure Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Roboto+Mono&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: rgba(248, 250, 252, 0.9); --accent: #2563eb; 
            --text-h: #0f172a; --text-p: #334155; --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.05); --bg-img: none;
        }

        [data-theme="dark"] { 
            --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; 
            --text-h: #f8fafc; --text-p: #94a3b8; --border: #1e293b; 
        }

        body { 
            background-color: var(--bg); 
            background-image: var(--bg-img);
            background-size: cover; background-attachment: fixed;
            color: var(--text-p); font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.4s ease; padding-bottom: 120px;
        }

        /* ADMIN HUD */
        .admin-hud {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #000; color: #fff; padding: 10px 20px;
            display: none; flex-wrap: wrap; gap: 15px; align-items: center;
            z-index: 10000; border-bottom: 2px solid var(--accent);
        }
        body.edit-mode .admin-hud { display: flex; }
        .hud-btn { background: #333; border: 1px solid #555; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .hud-btn:hover { background: var(--accent); }

        /* DASHBOARD */
        .dashboard { padding: 40px 8%; display: flex; flex-wrap: wrap; gap: 20px; }
        
        .box { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 24px; padding: 25px; position: relative;
            backdrop-filter: blur(10px); transition: 0.3s;
            min-height: 100px; display: flex; flex-direction: column;
        }
        body.edit-mode .box { resize: both; overflow: auto; border: 2px dashed var(--accent); }
        
        .w-small { width: calc(33.33% - 14px); }
        .w-med { width: calc(50% - 10px); }
        .w-full { width: 100%; }

        .box-tools { position: absolute; top: 10px; right: 10px; display: none; gap: 5px; z-index: 10; }
        body.edit-mode .box-tools { display: flex; }
        .tool-btn { width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .hero { padding: 120px 8% 40px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; color: var(--text-h); line-height: 1; outline: none; }

        .theme-hub { position: fixed; top: 80px; right: 30px; z-index: 1000; background: var(--card); padding: 10px; border-radius: 50px; border: 1px solid var(--border); display: flex; gap: 10px; }
        .t-btn { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .t-btn.active { border-color: var(--accent); transform: scale(1.2); }

        .ticker-wrap { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); padding: 12px; overflow: hidden; }
        .ticker { display: inline-block; animation: scroll 40s linear infinite; font-weight: 800; color: var(--accent); white-space: nowrap; outline: none; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body data-theme="default">

    <div class="admin-hud">
        <span>ADMIN MODE</span>
        <button class="hud-btn" onclick="addBox('w-small')">+ Small Box</button>
        <button class="hud-btn" onclick="addBox('w-med')">+ Med Box</button>
        <button class="hud-btn" onclick="addBox('w-full')">+ Full Box</button>
        <button class="hud-btn" onclick="setPageBg()">Set Background Image</button>
        <button class="hud-btn" onclick="resetData()" style="background:#ff4444">Reset All</button>
        <button class="hud-btn" style="background:var(--accent); margin-left:auto;" onclick="saveAndExit()">SAVE & LOCK</button>
    </div>

    <div class="theme-hub">
        <div class="t-btn" data-theme="dark" style="background: #0f172a;"></div>
        <div class="t-btn active" id="edit-trigger" data-theme="default" style="background: #2563eb;"></div>
        <div class="t-btn" data-theme="lite" style="background: #cbd5e1;"></div>
    </div>

    <header class="hero" id="hero-area">
        </header>

    <main class="dashboard" id="dashboard">
        </main>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker-content">SKILLS • EXPERIENCE • CERTIFICATIONS • PROJECTS • </div>
    </div>

    <script>
        const dashboard = document.getElementById('dashboard');
        const heroArea = document.getElementById('hero-area');
        const trigger = document.getElementById('edit-trigger');
        let pressTimer;

        // 1. Initial Default Data (If nothing is in LocalStorage)
        const defaultData = {
            bg: '',
            hero: `<h1 id="user-name">NAME HERE</h1><p id="user-role">JOB TITLE HERE</p>`,
            boxes: [
                { size: 'w-small', html: '<div class="stat-num">18+</div><div>Years Experience</div>', font: 'inherit', align: 'left' },
                { size: 'w-med', html: '<h2>Summary</h2><p>Your text here...</p>', font: 'inherit', align: 'left' }
            ]
        };

        // 2. Load Data from Storage
        function loadPage() {
            const saved = JSON.parse(localStorage.getItem('myDynamicDashboard')) || defaultData;
            
            // Set Background
            if(saved.bg) document.documentElement.style.setProperty('--bg-img', `url('${saved.bg}')`);

            // Set Hero
            heroArea.innerHTML = saved.hero;

            // Set Boxes
            dashboard.innerHTML = '';
            saved.boxes.forEach(boxData => {
                createBox(boxData.size, boxData.html, boxData.font, boxData.align);
            });
        }

        // 3. Admin Activation (Long Press)
        trigger.onmousedown = () => {
            pressTimer = setTimeout(() => {
                document.body.classList.add('edit-mode');
                document.querySelectorAll('.box, h1, p, .ticker').forEach(el => el.contentEditable = "true");
                alert("ADMIN MODE: Edit any text, drag box corners to resize, or use the top menu to add content.");
            }, 3000);
        };
        trigger.onmouseup = () => clearTimeout(pressTimer);

        // 4. Box Creation
        function createBox(size, html, font = 'inherit', align = 'left') {
            const div = document.createElement('div');
            div.className = `box ${size}`;
            div.style.fontFamily = font;
            div.style.textAlign = align;
            div.innerHTML = `
                <div class="box-tools" contenteditable="false">
                    <button class="tool-btn" onclick="customizeBox(this)">⚙️</button>
                    <button class="tool-btn" style="background:#ff4444;color:white" onclick="this.closest('.box').remove()">×</button>
                </div>
                <div class="inner-content">${html}</div>
            `;
            dashboard.appendChild(div);
        }

        function addBox(size) {
            createBox(size, '<h2>New Section</h2><p>Edit this content...</p>');
            document.querySelectorAll('.box').forEach(el => el.contentEditable = "true");
        }

        // 5. Customization Tools
        function customizeBox(btn) {
            const box = btn.closest('.box');
            const size = prompt("Font Size (px):", "16px");
            const font = prompt("Font (sans-serif, serif, Roboto Mono):", "sans-serif");
            const align = prompt("Align (left, center, right):", "left");
            if(size) box.style.fontSize = size;
            if(font) box.style.fontFamily = font;
            if(align) box.style.textAlign = align;
        }

        function setPageBg() {
            const url = prompt("Enter Image URL:");
            if(url) {
                document.documentElement.style.setProperty('--bg-img', `url('${url}')`);
                document.documentElement.style.setProperty('--bg', `transparent`);
            }
        }

        // 6. Save Data
        function saveAndExit() {
            const dataToSave = {
                bg: getComputedStyle(document.documentElement).getPropertyValue('--bg-img').replace(/url\(['"]?(.*?)['"]?\)/i, '$1'),
                hero: heroArea.innerHTML,
                boxes: []
            };

            document.querySelectorAll('.box').forEach(box => {
                dataToSave.boxes.push({
                    size: Array.from(box.classList).find(c => c.startsWith('w-')),
                    html: box.querySelector('.inner-content').innerHTML,
                    font: box.style.fontFamily,
                    align: box.style.textAlign
                });
            });

            localStorage.setItem('myDynamicDashboard', JSON.stringify(dataToSave));
            document.body.classList.remove('edit-mode');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "false");
            alert("Changes saved to local storage!");
        }

        function resetData() {
            if(confirm("Clear all data?")) {
                localStorage.removeItem('myDynamicDashboard');
                location.reload();
            }
        }

        // Initialize
        loadPage();

        // Theme Switch
        document.querySelectorAll('.t-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.body.setAttribute('data-theme', btn.dataset.theme);
            };
        });
    </script>
</body>
</html>
